<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Icikiwir Esports</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="elite-page elite-login-page cinematic-auth-page">
  <main class="cinematic-auth-shell">
    <a class="cinematic-brand" href="index.html" aria-label="Icikiwir Esports">
      <span>ICIKIWIR</span>
      <small>TOURNEY</small>
    </a>

    <section class="cinematic-auth-panel" aria-label="Authentication form">
      <div class="cinematic-auth-title">
        <h1 id="auth-card-title">Siap tanding?</h1>
        <p id="auth-card-subtitle">Masuk dulu, lanjut ke lobby.</p>
      </div>

      <p id="auth-status-message" class="auth-message cinematic-message"></p>

      <form id="login-form" class="cinematic-form">
        <label class="cinematic-field">
          <i class="ri-mail-line"></i>
          <input type="text" id="loginUsername" placeholder="Email atau username" autocomplete="username" required>
        </label>

        <label class="cinematic-field">
          <i class="ri-lock-2-fill"></i>
          <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
          <button type="button" class="cinematic-eye-btn" id="toggle-password" aria-label="Show password"><i class="ri-eye-fill"></i></button>
        </label>

        <button type="submit" class="cinematic-submit-btn">Masuk</button>
        <button type="button" class="cinematic-link-btn auth-forgot">Lupa password?</button>

        <p class="cinematic-switch">Belum punya akun? <button id="to-register-btn" class="cinematic-link-btn cinematic-accent">Daftar</button></p>
      </form>

      <form id="register-form" class="cinematic-form hidden">
        <label class="cinematic-field cinematic-select">
          <i class="ri-user-settings-line"></i>
          <select id="regAccountType" required>
            <option value="team">Team</option>
            <option value="user">Solo Player</option>
          </select>
        </label>

        <label class="cinematic-field"><i class="ri-at-line"></i><input type="text" id="regUsername" placeholder="Username" required></label>
        <label class="cinematic-field"><i class="ri-team-line"></i><input type="text" id="regTeamName" placeholder="Team / Player name" required></label>
        <label class="cinematic-field"><i class="ri-whatsapp-line"></i><input type="tel" id="regWhatsapp" placeholder="WhatsApp" required></label>
        <label class="cinematic-field"><i class="ri-mail-line"></i><input type="email" id="regEmail" placeholder="Email" required></label>
        <label class="cinematic-field"><i class="ri-lock-password-line"></i><input type="password" id="regPassword" placeholder="Password" required></label>

        <button type="submit" class="cinematic-submit-btn">Buat akun</button>
        <p class="cinematic-switch">Sudah punya akun? <button id="to-login-btn" class="cinematic-link-btn cinematic-accent">Masuk</button></p>
      </form>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script type="module" src="assets/js/pages/login.js"></script>
  <script>
    const toggle = document.getElementById('toggle-password');
    const pass = document.getElementById('loginPassword');
    if (toggle && pass) {
      toggle.addEventListener('click', () => {
        const shown = pass.type === 'text';
        pass.type = shown ? 'password' : 'text';
        toggle.innerHTML = shown ? '<i class="ri-eye-fill"></i>' : '<i class="ri-eye-off-fill"></i>';
      });
    }
    const title = document.getElementById('auth-card-title');
    const subtitle = document.getElementById('auth-card-subtitle');
    document.getElementById('to-register-btn')?.addEventListener('click', () => {
      title.textContent = 'Bikin akun';
      subtitle.textContent = 'Isi data singkat, langsung masuk lobby.';
    });
    document.getElementById('to-login-btn')?.addEventListener('click', () => {
      title.textContent = 'Siap tanding?';
      subtitle.textContent = 'Masuk dulu, lanjut ke lobby.';
    });
  </script>
</body>
</html>
