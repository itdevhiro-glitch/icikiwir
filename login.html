<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Icikiwir Esports</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-hero">
      <div class="brand-mark"><span class="brand-icon"><i class="ri-gamepad-fill"></i></span>Icikiwir Esports</div>
      <div>
        <h1>Esports Tournament Manager</h1>
        <p>Dashboard modern untuk roster team, tournament, leaderboard, bracket live, payment approval, dan mode baru 1 vs 1 Brawl.</p>
      </div>
      <div class="hero-metrics"><span class="metric">Realtime Firebase</span><span class="metric">Team & Brawl</span><span class="metric">Mobile Ready</span></div>
    </section>
    <section class="auth-box">
      <h2 class="auth-title">Login Account</h2>
      <p class="auth-subtitle">Masuk sebagai admin, team, atau solo player.</p>
      <p id="auth-status-message" class="auth-message"></p>
      <form id="login-form" class="form-grid">
        <input type="text" id="loginUsername" placeholder="Username / admin" autocomplete="username" required>
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" class="btn"><i class="ri-login-circle-line"></i> Login</button>
        <p>New team? <button id="to-register-btn" class="link-btn">Register here</button></p>
      </form>
      <form id="register-form" class="form-grid hidden">
        <select id="regAccountType" required><option value="team">Register sebagai Team</option><option value="user">Register sebagai User / Solo Player</option></select>
        <input type="text" id="regUsername" placeholder="Username tanpa spasi" required>
        <input type="text" id="regTeamName" placeholder="Team Name / Nama Player" required>
        <input type="tel" id="regWhatsapp" placeholder="WhatsApp aktif, contoh 08123456789" required>
        <input type="email" id="regEmail" placeholder="Email @icikiwir.digital" required>
        <input type="password" id="regPassword" placeholder="Password minimal 6 karakter" required>
        <button type="submit" class="btn success"><i class="ri-user-add-line"></i> Register</button>
        <p>Have account? <button id="to-login-btn" class="link-btn">Login here</button></p>
      </form>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script type="module" src="assets/js/pages/login.js"></script>
</body>
</html>
